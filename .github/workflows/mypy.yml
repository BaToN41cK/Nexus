name: "mypy"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: "mypy"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: "Install package with all extras"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: "Install mypy"
        run: pip install mypy

      - name: "Run mypy"
        run: mypy nexus
