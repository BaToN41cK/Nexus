# =============================================================================
# Nexus Configuration
# =============================================================================

# --- Provider Settings ---
# Supported providers: groq, openai, anthropic, ollama
provider: "groq"

# Model name for the selected provider
#   groq:     "llama-3.3-70b-versatile", "mixtral-8x7b-32768", etc.
#   openai:   "gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo", etc.
#   anthropic: "claude-sonnet-4-20250514", "claude-haiku-3-5", etc.
#   ollama:   "llama3.2", "mistral", "codellama", etc.
groq_model: "llama-3.3-70b-versatile"

# Custom base URL (for OpenAI-compatible APIs or Ollama)
#   OpenAI-compatible: "https://api.openai.com/v1"
#   Ollama: "http://localhost:11434"
base_url: ""

# API key will be read from environment variable GROQ_API_KEY (or OPENAI_API_KEY,
# ANTHROPIC_API_KEY depending on provider). You can also put it in ~/.nexus/.env

# --- Generation Settings ---
timeout: 30
max_tokens: 4096
temperature: 0.7

# --- Content Loading ---
max_content_length: 50000
summarize_threshold: 40000

# --- Cache ---
cache_ttl: 3600
max_cache_size_mb: 50      # Auto-clean cache when it exceeds this size (MB)
max_retries: 3
rate_limit: 5

# --- Conversation History ---
# Number of previous exchanges to remember for context (default: 5)
conversation_history_size: 5

# --- System Prompt ---
system_prompt: >-
  Ты — Nexus, продвинутый ИИ-ассистент-разработчик. Твоя главная задача —
  помогать пользователям с любыми вопросами по программированию, конфигурации,
  архитектуре и разработке в целом.

  ВАЖНЫЕ ПРАВИЛА:
  1. Отвечай ПОДРОБНО и РАЗВЁРНУТО. Не сокращай ответы до минимума — если вопрос
     заслуживает длинного ответа, дай длинный ответ с объяснениями.
  2. Всегда добавляй КОНТЕКСТ: объясняй ЗАЧЕМ что-то делается, какие есть
     альтернативы, какие подводные камни.
  3. Используй структурированный markdown-формат: заголовки, списки, блоки кода,
     таблицы, когда это уместно.
  4. Давай ПОЛНЫЕ примеры кода с комментариями, а не только фрагменты.
  5. Если вопрос подразумевает анализ — проводи его глубоко, выделяй ключевые
     моменты, плюсы/минусы, рекомендации.
  6. Отвечай на том же языке, на котором задан вопрос.
  7. Не бойся повторить важные моменты — лучше перестраховаться.
  8. Если что-то непонятно — задай уточняющий вопрос, а не давай
     поверхностный ответ.
  9. По возможности предлагай следующие шаги или расширяй тему.

# --- Web Search ---
# Allows Nexus to look up fresh information from the internet before answering.
# Enable per-call with `nexus run "..." --search` or globally by setting
# `enabled: true` (then use `--no-search` to opt out for a specific call).
#
# Backends (chosen automatically when backend is "auto"):
#   - tavily:    recommended, free tier: https://tavily.com
#   - bing:      Azure Bing Web Search (1000 req/month free)
#   - searxng:   public or self-hosted SearXNG instance
#   - duckduckgo: no key required, default fallback
web_search:
  enabled: false
  backend: "auto"            # auto | duckduckgo | tavily | searxng | bing
  max_results: 5
  fetch_top_n: 3
  timeout: 15
  cache_enabled: true
  cache_ttl: 3600
  # Optional: provide API keys here (otherwise they are read from .env)
  # tavily_api_key: "tvly-..."
  # bing_api_key: "..."
  # searxng_url: "https://searx.be"

# --- RAG (Retrieval-Augmented Generation) ---
# Enables semantic search over indexed documents.
rag:
  enabled: false
  # Embedding backend: "sentence-transformers" (local), "openai", "ollama"
  embedding_backend: "sentence-transformers"
  embedding_model: "all-MiniLM-L6-v2"
  # Vector store backend: "faiss" or "chroma"
  vector_store_backend: "faiss"
  # Persistence: where to store the index
  index_path: "~/.nexus/rag/index.faiss"
  # Chunking settings
  chunk_size: 512
  chunk_overlap: 64
  # Retrieval settings
  top_k_initial: 20
  top_k_after_rerank: 5
  use_bm25: true
  use_mmr: true
  use_cross_encoder: false

# --- Resilience (Circuit Breaker + Retry) ---
# Controls how Nexus handles LLM provider failures.
resilience:
  # Retry settings (tenacity-style exponential backoff)
  retry:
    max_retries: 3
    min_backoff: 1.0        # seconds
    max_backoff: 60.0       # seconds
    backoff_multiplier: 2.0
    jitter_factor: 0.1
  # Circuit breaker settings
  circuit_breaker:
    failure_threshold: 5     # failures before circuit opens
    recovery_timeout: 30.0   # seconds before half-open
    half_open_max_calls: 3
    consecutive_successes_to_close: 2
  # Idempotency cache TTL (seconds)
  idempotency_ttl: 3600
